services:
  mysql:
    image: mariadb:11  
    container_name: studentsystemgo-mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Schema only (committed to git, sanitized — no data).
      # If you want seed data locally, create docker-compose.override.yml
      # (see docker-compose.override.example.yml). The override is gitignored.
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    container_name: studentsystemgo-redis
    restart: unless-stopped
    # `--appendonly yes` enables persistence (writes log to disk) so data
    # survives container restarts. For rate limiting we don't strictly need
    # persistence (TTL keys are short-lived), but it's cheap insurance.
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"   # exposed on host for local debugging (redis-cli)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-net

  app:
    build: .
    container_name: studentsystemgo-app
    env_file:
      - .env
    environment:
      HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      USE_TLS: "false"
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:

volumes:
  mysql_data:
  redis_data: