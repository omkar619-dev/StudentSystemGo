services:
  mysql:
    image: mariadb:11  
    container_name: studentsystemgo-mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Schema (committed to git, sanitized — no data)
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # Seed data (local-only, gitignored). MariaDB runs files alphabetically,
      # so 01-init.sql creates tables, then 02-seed.local.sql populates them.
      # If this file doesn't exist on a fresh clone, MariaDB skips it (no error)
      # and the container starts with empty tables — expected for public-repo clones.
      - ./scripts/init.full.local.sql:/docker-entrypoint-initdb.d/02-seed.local.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-net

  app:
    build: .
    container_name: studentsystemgo-app
    env_file:
      - .env
    environment:
      HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      USE_TLS: "false"
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:

volumes:
  mysql_data: