services:
  mysql:
    image: mariadb:11  
    container_name: studentsystemgo-mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Schema only (committed to git, sanitized — no data).
      # If you want seed data locally, create docker-compose.override.yml
      # (see docker-compose.override.example.yml). The override is gitignored.
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-net

  app:
    build: .
    container_name: studentsystemgo-app
    env_file:
      - .env
    environment:
      HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      USE_TLS: "false"
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:

volumes:
  mysql_data: