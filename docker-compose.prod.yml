services:
  mysql:
    image: mariadb:11
    container_name: studentsystemgo-mysql
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    # No host port mapping in production — only internal access via Docker network.
    # If you need external DB access for debugging: temporarily add `ports: ["3307:3306"]`
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-net

  # ── Redis: shared state for rate limiter (Phase 1 Step 5) ────
  # All 3 app instances connect to the same Redis → shared rate-limit counters.
  # Without Redis, each instance would have its own counters and effective
  # rate limit would be N × stated limit (where N = number of app instances).
  redis:
    image: redis:7-alpine
    container_name: studentsystemgo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"   # internal only — no public port mapping
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-net

  # ── 3 identical app instances ───────────────────────────
  # Same image, same env, different container names.
  # Nginx load-balances across them.
  # If one crashes, the other 2 keep serving.

  app1:
    image: ghcr.io/omkar619-dev/studentsystemgo:latest
    container_name: studentsystemgo-app1
    restart: unless-stopped
    environment:
      HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      USE_TLS: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RESET_TOKEN_EXP_DURATION: ${RESET_TOKEN_EXP_DURATION}
      REDIS_URL: redis://redis:6379
    expose:
      - "3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  app2:
    image: ghcr.io/omkar619-dev/studentsystemgo:latest
    container_name: studentsystemgo-app2
    restart: unless-stopped
    environment:
      HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      USE_TLS: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RESET_TOKEN_EXP_DURATION: ${RESET_TOKEN_EXP_DURATION}
      REDIS_URL: redis://redis:6379
    expose:
      - "3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  app3:
    image: ghcr.io/omkar619-dev/studentsystemgo:latest
    container_name: studentsystemgo-app3
    restart: unless-stopped
    environment:
      HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      USE_TLS: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RESET_TOKEN_EXP_DURATION: ${RESET_TOKEN_EXP_DURATION}
      REDIS_URL: redis://redis:6379
    expose:
      - "3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  # ── Nginx: the only public-facing service ───────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: studentsystemgo-nginx
    restart: unless-stopped
    ports:
      - "80:80"          # only port exposed to the internet
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - app-net

networks:
  app-net:

volumes:
  mysql_data:
  redis_data:
