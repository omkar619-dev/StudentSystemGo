services:
  # ── PRIMARY (writes) ───────────────────────────────────────
  mysql_primary:
    image: mariadb:11
    container_name: studentsystemgo-mysql-primary
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    expose:
      - "3306"
    volumes:
      - mysql_primary_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./mysql/init/00-replication-user.sql:/docker-entrypoint-initdb.d/00-replication-user.sql:ro
      - ./mysql/primary.cnf:/etc/mysql/conf.d/primary.cnf:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-net

  # ── REPLICA (reads) ────────────────────────────────────────
  # Pulls binlog from primary, applies locally. Takes a few seconds to catch up.
  mysql_replica:
    image: mariadb:11
    container_name: studentsystemgo-mysql-replica
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    expose:
      - "3306"
    volumes:
      - mysql_replica_data:/var/lib/mysql
      - ./mysql/init/99-set-up-replication.sql:/docker-entrypoint-initdb.d/99-set-up-replication.sql:ro
      - ./mysql/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mysql_primary:
        condition: service_healthy
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    container_name: studentsystemgo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-net

  # ── App instances (2, dropped from 3 due to memory constraints on t3.micro) ──
  # Both share state via Redis (rate limit) and MariaDB (data).
  # Adding instances later: copy app1 block, change container_name + add to nginx upstream.

  app1:
    image: ghcr.io/omkar619-dev/studentsystemgo:latest
    container_name: studentsystemgo-app1
    restart: unless-stopped
    environment:
      DB_PRIMARY_HOST: mysql_primary
      DB_REPLICA_HOST: mysql_replica
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      USE_TLS: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RESET_TOKEN_EXP_DURATION: ${RESET_TOKEN_EXP_DURATION}
      REDIS_URL: redis://redis:6379
    expose:
      - "3000"
    depends_on:
      mysql_primary:
        condition: service_healthy
      mysql_replica:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  app2:
    image: ghcr.io/omkar619-dev/studentsystemgo:latest
    container_name: studentsystemgo-app2
    restart: unless-stopped
    environment:
      DB_PRIMARY_HOST: mysql_primary
      DB_REPLICA_HOST: mysql_replica
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      USE_TLS: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RESET_TOKEN_EXP_DURATION: ${RESET_TOKEN_EXP_DURATION}
      REDIS_URL: redis://redis:6379
    expose:
      - "3000"
    depends_on:
      mysql_primary:
        condition: service_healthy
      mysql_replica:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  # ── Nginx LB ───────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: studentsystemgo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - app-net

networks:
  app-net:

volumes:
  mysql_primary_data:
  mysql_replica_data:
  redis_data:
