# Nginx config for StudentSystemGo
# Sits in front of 3 Go app instances and load-balances between them.

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    # ── Basic settings ──────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;            # don't leak Nginx version in headers

    # ── Logging ──────────────────────────────────────────────
    # Custom log format that includes which upstream handled the request.
    # Helps verify load balancing is actually working.
    log_format with_upstream '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log with_upstream;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip (compression) ──────────────────────────────────
    # App also gzips responses — this is for Nginx's own static assets.
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream pool: the 3 app instances ──────────────────
    # `least_conn` = send each new request to the upstream with fewest
    # active connections. Better than round-robin when requests have
    # varying duration.
    #
    # `max_fails=2 fail_timeout=10s` = if an upstream fails 2 requests
    # in 10 seconds, mark it down for 10s. Auto-recovery.
    upstream app_backend {
        least_conn;
        # Two app instances on t3.micro (was 3 in Step 4; reduced to make room
        # for the MariaDB read replica added in Step 6). Add more lines here
        # to scale horizontally — e.g., `server app3:3000 ...` etc.
        server app1:3000 max_fails=2 fail_timeout=10s;
        server app2:3000 max_fails=2 fail_timeout=10s;

        keepalive 32;             # reuse upstream connections (faster)
    }

    # ── Server block ────────────────────────────────────────
    server {
        listen 80;
        server_name _;            # any hostname/IP — single-tenant for now

        # Reasonable client body size (uploads, large POSTs)
        client_max_body_size 10M;

        # ── Health check (Nginx's own, fast) ────────────────
        # Useful for AWS load balancer / external monitoring later.
        # Doesn't go to upstream — just confirms Nginx is responsive.
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Everything else proxies to the app pool ─────────
        location / {
            proxy_pass http://app_backend;

            # Pass useful info to upstream
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Timeouts: don't hold a request forever waiting on backend
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Retry on next upstream if current one fails (fault tolerance)
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
        }
    }
}
